<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="EasyIntern">
  <defs>
    <linearGradient id="fi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="fa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#fi)"/>
  <!-- Large accent orb — dominant at favicon sizes -->
  <circle cx="32" cy="26" r="15" fill="url(#fa)"/>
  <!-- Strong white bars (read as “opportunity / steps”) -->
  <rect x="10" y="42" width="44" height="6" rx="2" fill="#ffffff"/>
  <rect x="10" y="50" width="34" height="5" rx="2" fill="#e2e8f0" opacity="0.95"/>
</svg>
